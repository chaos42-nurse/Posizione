<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#0d0d0d;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

#text {
  font-size:20px;
  max-width:500px;
  min-height:60px;
}

#text::after {
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink {
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}
</style>
</head>

<body>

<p id="text"></p>

<script>
const STORAGE_KEY = "savedLocation";

const frasiReset = [
  "Sei in macchina"
];

const target = document.getElementById("text");

// 🔹 TYPING
function typing(text, callback){
  let i = 0;
  target.textContent = "";

  function write(){
    if(i < text.length){
      target.textContent += text[i++];
      setTimeout(write, 40);
    } else {
      setTimeout(callback, 800);
    }
  }

  write();
}

// 🔹 RESET
function resetLocation(){
  localStorage.removeItem(STORAGE_KEY);
}

// 🔹 START
function start(){
  const frase = frasiReset[Math.floor(Math.random()*frasiReset.length)];

  typing(frase, ()=>{
    resetLocation();
  });
}

start();
</script>

</body>
</html>
