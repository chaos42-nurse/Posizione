<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Reset invisibile</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent; /* sfondo trasparente */
    height: 100%;
    width: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  /* Messaggio leggibile in basso centro */
  .message {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 14px 22px;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
    animation: fadeInOut 2s forwards;
    text-align: center;
  }

  @keyframes fadeInOut {
    0% { opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="message">Sei in macchina</div>

<script>
const STORAGE_KEY = "savedLocation";

// Elimina la posizione
localStorage.removeItem(STORAGE_KEY);

// Reindirizza la pagina invisibile dopo 2 secondi
setTimeout(() => {
  window.location.href = "about:blank";
}, 2000);
</script>

</body>
</html>
