<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#0d0d0d;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  overflow:hidden;
}

/* testo */
#text {
  font-size:20px;
  max-width:500px;
  min-height:60px;
}

/* cursore */
#text::after {
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink {
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* animazione loading */
#loader {
  margin-top:30px;
  width:40px;
  height:40px;
  border:3px solid rgba(255,255,255,0.2);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
  opacity:0;
  transition:0.3s;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* effetto “fade out” prima del redirect */
.fade-out {
  opacity:0;
  transition:0.8s;
}
</style>
</head>

<body>

<p id="text"></p>
<div id="loader"></div>

<script>
const STORAGE_KEY = "savedLocation";

const frasiSalvataggio = [
  "Posizione salvata"
];

const frasiRitorno = [
  "Ti porto in macchina"
];

const target = document.getElementById("text");
const loader = document.getElementById("loader");

// 🔹 typing
function typing(text, callback){
  let i = 0;
  target.textContent = "";

  function write(){
    if(i < text.length){
      target.textContent += text[i++];
      setTimeout(write, 40);
    } else {
      setTimeout(callback, 600);
    }
  }

  write();
}

// 🔹 animazione + redirect
function openMaps(lat,lng){
  const url = `https://www.google.com/maps?q=${lat},${lng}`;

  loader.style.opacity = "1";

  setTimeout(() => {
    document.body.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = url;
    }, 800);

  }, 1200);
}

// 🔹 LOGICA
function start(){
  const saved = localStorage.getItem(STORAGE_KEY);

  if(saved){
    const loc = JSON.parse(saved);

    typing(frasiRitorno[0], ()=>{
      openMaps(loc.lat, loc.lng);
    });

  } else {

    typing(frasiSalvataggio[0], ()=>{
      navigator.geolocation.getCurrentPosition(pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        localStorage.setItem(STORAGE_KEY, JSON.stringify({lat,lng}));

        openMaps(lat,lng);
      });
    });
  }
}

start();
</script>

</body>
</html>
